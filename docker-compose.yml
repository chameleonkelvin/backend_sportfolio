version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: scoring_app_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: scoring_app_db
      MYSQL_USER: scoring_user
      MYSQL_PASSWORD: scoring_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - scoring_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

volumes:
  mysql_data:
    driver: local

networks:
  scoring_network:
    driver: bridge
